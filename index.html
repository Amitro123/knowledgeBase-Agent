<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מאגר ידע AI — Amitro</title>
  <meta name="description" content="מאגר קישורי AI אישי — כלים, מחקר, מדריכים ועוד, מעובד ומועשר בעזרת Claude." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Tokens ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d0f17;
      --bg2:         #13161f;
      --bg3:         #1a1e2e;
      --surface:     #1e2235;
      --surface2:    #252a3d;
      --border:      #2d3352;
      --border-hover:#4a5280;
      --text:        #e8eaf6;
      --text-dim:    #8892b0;
      --text-dimmer: #4a5568;
      --accent:      #7c6af7;
      --accent2:     #5b8dee;
      --accent3:     #f97a6c;
      --green:       #52d9a0;
      --yellow:      #f7c948;
      --radius:      12px;
      --radius-sm:   8px;
      --shadow:      0 4px 24px rgba(0,0,0,.45);
      --glow:        0 0 24px rgba(124,106,247,.18);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Heebo', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background mesh ─────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 10% 10%, rgba(124,106,247,.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 80%, rgba(91,141,238,.07) 0%, transparent 55%);
    }

    /* ── Layout ──────────────────────────────────────────────────────── */
    .wrapper { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* ── Header ──────────────────────────────────────────────────────── */
    header {
      padding: 56px 0 40px;
      border-bottom: 1px solid var(--border);
    }

    .header-inner { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 20px; }

    .logo {
      display: flex; align-items: center; gap: 14px;
    }

    .logo-icon {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; box-shadow: var(--glow);
    }

    .logo-text h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -.02em; }
    .logo-text p  { font-size: .85rem; color: var(--text-dim); margin-top: 2px; }

    .header-stats {
      display: flex; gap: 24px;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 1.6rem; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label { font-size: .75rem; color: var(--text-dim); margin-top: 2px; }

    /* ── Controls ────────────────────────────────────────────────────── */
    .controls {
      padding: 28px 0 20px;
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    }

    .search-wrap {
      flex: 1 1 280px; position: relative;
    }

    #search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 44px 12px 16px;
      border-radius: var(--radius-sm);
      font-size: .95rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    #search-input::placeholder { color: var(--text-dimmer); }
    #search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,247,.15); }

    .search-icon {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-dim); pointer-events: none; font-size: 16px;
    }

    .filters { display: flex; flex-wrap: wrap; gap: 8px; }

    .filter-btn {
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: .82rem;
      font-family: inherit;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
    }

    .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    /* ── Sort & count ────────────────────────────────────────────────── */
    .toolbar {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 16px;
      font-size: .84rem; color: var(--text-dim);
    }

    #results-count { }

    #sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px; border-radius: var(--radius-sm);
      font-size: .84rem; font-family: inherit; outline: none;
      cursor: pointer;
    }

    /* ── Grid ────────────────────────────────────────────────────────── */
    #cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      padding-bottom: 60px;
    }

    /* ── Card ────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      display: flex; flex-direction: column; gap: 12px;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute; top: 0; right: 0; left: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity .2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow), var(--glow);
      border-color: var(--border-hover);
    }

    .card:hover::before { opacity: 1; }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }

    .card-title {
      font-size: .98rem; font-weight: 600;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .category-badge {
      flex-shrink: 0;
      font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
      padding: 3px 9px; border-radius: 999px;
    }

    .category-badge.tutorial   { background: rgba(82,217,160,.15); color: var(--green); }
    .category-badge.tool       { background: rgba(124,106,247,.18); color: var(--accent); }
    .category-badge.research   { background: rgba(91,141,238,.18); color: var(--accent2); }
    .category-badge.news       { background: rgba(247,201,72,.12); color: var(--yellow); }
    .category-badge.reference  { background: rgba(249,122,108,.12); color: var(--accent3); }
    .category-badge.community  { background: rgba(82,217,160,.12); color: var(--green); }
    .category-badge.other      { background: rgba(255,255,255,.06); color: var(--text-dim); }
    .category-badge.uncategorised { background: rgba(255,255,255,.06); color: var(--text-dim); }

    .card-summary {
      font-size: .86rem; color: var(--text-dim); line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto;
    }

    .tag {
      font-size: .72rem; padding: 3px 9px; border-radius: 999px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-dim);
      transition: all .15s;
    }

    .card:hover .tag { border-color: var(--border-hover); color: var(--text); }

    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
      font-size: .75rem; color: var(--text-dimmer);
      border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px;
    }

    .card-url {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 65%;
      color: var(--accent2); opacity: .75;
    }

    /* ── Empty state ─────────────────────────────────────────────────── */
    #empty-state {
      display: none; flex-direction: column; align-items: center;
      gap: 16px; padding: 80px 0; text-align: center;
      color: var(--text-dim);
    }

    #empty-state .empty-icon { font-size: 3rem; }
    #empty-state h3 { font-size: 1.1rem; color: var(--text); }
    #empty-state p  { font-size: .88rem; max-width: 320px; }

    /* ── Loading ─────────────────────────────────────────────────────── */
    #loading {
      display: flex; justify-content: center; padding: 60px 0;
    }

    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ──────────────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
      text-align: center;
      font-size: .78rem;
      color: var(--text-dimmer);
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 36px 0 28px; }
      .header-inner { flex-direction: column; align-items: flex-start; }
      .header-stats { gap: 16px; }
      #cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- Header -->
    <header>
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">🧠</div>
          <div class="logo-text">
            <h1>מאגר ידע AI</h1>
            <p>קישורים, כלים ומחקר — מועשרים בעזרת Claude</p>
          </div>
        </div>
        <div class="header-stats">
          <div class="stat">
            <div class="stat-num" id="total-count">—</div>
            <div class="stat-label">משאבים</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="categories-count">—</div>
            <div class="stat-label">קטגוריות</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="last-updated">—</div>
            <div class="stat-label">עדכון אחרון</div>
          </div>
        </div>
      </div>
    </header>

    <!-- Controls -->
    <div class="controls">
      <div class="search-wrap">
        <input
          type="search"
          id="search-input"
          placeholder="חפש לפי שם, תגית, URL..."
          aria-label="חיפוש"
        />
        <span class="search-icon">🔍</span>
      </div>
      <div class="filters" id="filters-bar" role="group" aria-label="סינון לפי קטגוריה">
        <button class="filter-btn active" data-cat="all" id="filter-all">הכל</button>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <span id="results-count"></span>
      <select id="sort-select" aria-label="מיון">
        <option value="newest">חדש → ישן</option>
        <option value="oldest">ישן → חדש</option>
        <option value="alpha">א–ת</option>
      </select>
    </div>

    <!-- Loading -->
    <div id="loading"><div class="spinner"></div></div>

    <!-- Cards -->
    <div id="cards-grid" role="list" aria-label="רשימת משאבים"></div>

    <!-- Empty state -->
    <div id="empty-state" role="status">
      <div class="empty-icon">🔍</div>
      <h3>לא נמצאו תוצאות</h3>
      <p>נסה מילת חיפוש אחרת או הסר את הסינון</p>
    </div>

  </div><!-- /wrapper -->

  <footer>
    <div class="wrapper">
      עודכן אוטומטית ע"י
      <a href="https://github.com/Amitro123/knowledgeBase-Agent" target="_blank" rel="noopener">KnowledgeBase Agent</a>
      · מופעל ע"י GitHub Actions + OpenRouter
    </div>
  </footer>

  <script>
    // ── State ────────────────────────────────────────────────────────────
    let allResources = [];
    let activeCategory = 'all';
    let sortOrder = 'newest';
    let searchQuery = '';

    // ── Fetch resources.json ─────────────────────────────────────────────
    async function loadResources() {
      try {
        const res = await fetch('./data/resources.json?_=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        allResources = await res.json();
      } catch (err) {
        console.error('Failed to load resources.json:', err);
        allResources = [];
      }

      document.getElementById('loading').style.display = 'none';
      initUI();
    }

    // ── Build category filter buttons ────────────────────────────────────
    function initUI() {
      // Stats
      document.getElementById('total-count').textContent = allResources.length;

      const cats = [...new Set(allResources.map(r => r.category || 'other'))];
      document.getElementById('categories-count').textContent = cats.length;

      if (allResources.length > 0) {
        const latest = allResources.reduce((a, b) =>
          (a.added_at || '') > (b.added_at || '') ? a : b
        );
        document.getElementById('last-updated').textContent =
          latest.added_at ? latest.added_at.slice(5) : '—';
      }

      // Filter buttons
      const bar = document.getElementById('filters-bar');
      const CATEGORY_LABELS = {
        tutorial: '📚 מדריכים',
        tool: '🛠 כלים',
        research: '🔬 מחקר',
        news: '📰 חדשות',
        reference: '📖 עזר',
        community: '👥 קהילה',
        other: '📌 אחר',
        uncategorised: '❓ לא מסווג',
      };

      cats.sort().forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.cat = cat;
        btn.id = `filter-${cat}`;
        btn.textContent = CATEGORY_LABELS[cat] || cat;
        btn.addEventListener('click', () => setCategory(cat));
        bar.appendChild(btn);
      });

      render();
    }

    // ── Category toggle ──────────────────────────────────────────────────
    function setCategory(cat) {
      activeCategory = cat;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.cat === cat);
      });
      render();
    }

    // ── Filter + sort ────────────────────────────────────────────────────
    function getFiltered() {
      let items = allResources;

      if (activeCategory !== 'all') {
        items = items.filter(r => (r.category || 'other') === activeCategory);
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        items = items.filter(r =>
          (r.title || '').toLowerCase().includes(q) ||
          (r.summary || '').toLowerCase().includes(q) ||
          (r.url || '').toLowerCase().includes(q) ||
          (r.tags || []).some(t => t.toLowerCase().includes(q))
        );
      }

      items = [...items];
      if (sortOrder === 'newest') {
        items.sort((a, b) => (b.added_at || '') > (a.added_at || '') ? 1 : -1);
      } else if (sortOrder === 'oldest') {
        items.sort((a, b) => (a.added_at || '') > (b.added_at || '') ? 1 : -1);
      } else {
        items.sort((a, b) => (a.title || '').localeCompare(b.title || '', 'he'));
      }

      return items;
    }

    // ── Render cards ─────────────────────────────────────────────────────
    function render() {
      const items = getFiltered();
      const grid = document.getElementById('cards-grid');
      const empty = document.getElementById('empty-state');
      const count = document.getElementById('results-count');

      grid.innerHTML = '';

      if (items.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'flex';
        count.textContent = 'אין תוצאות';
        return;
      }

      grid.style.display = 'grid';
      empty.style.display = 'none';
      count.textContent = `${items.length} משאבים`;

      items.forEach(r => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = r.url || '#';
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.setAttribute('role', 'listitem');
        card.setAttribute('aria-label', r.title || r.url);

        const cat = r.category || 'other';
        const tags = (r.tags || []).slice(0, 5)
          .map(t => `<span class="tag">${escHtml(t)}</span>`).join('');

        const domain = (() => {
          try { return new URL(r.url).hostname.replace('www.', ''); } catch { return r.url || ''; }
        })();

        card.innerHTML = `
          <div class="card-header">
            <div class="card-title">${escHtml(r.title || r.url)}</div>
            <span class="category-badge ${cat}">${escHtml(cat)}</span>
          </div>
          ${r.summary ? `<div class="card-summary">${escHtml(r.summary)}</div>` : ''}
          ${tags ? `<div class="card-tags">${tags}</div>` : ''}
          <div class="card-footer">
            <span class="card-url">${escHtml(domain)}</span>
            <span>${r.added_at || ''}</span>
          </div>`;

        grid.appendChild(card);
      });
    }

    // ── Utils ────────────────────────────────────────────────────────────
    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Event listeners ──────────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      render();
    });

    document.getElementById('filter-all').addEventListener('click', () => setCategory('all'));

    document.getElementById('sort-select').addEventListener('change', e => {
      sortOrder = e.target.value;
      render();
    });

    // ── Init ─────────────────────────────────────────────────────────────
    loadResources();
  </script>
</body>
</html>
